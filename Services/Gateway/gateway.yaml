ReverseProxy:
  Routes:
    identity-route:
      ClusterId: identity-cluster
      Match:
        Path: /api/User/{**catch-all}

    membership-route:
      ClusterId: membership-cluster
      Match:
        Path: /api/members/{**catch-all}

    membership-plans-route:
      ClusterId: membership-cluster
      Match:
        Path: /api/plans/{**catch-all}

    subscriptions-route:
      ClusterId: membership-cluster
      Match:
        Path: /api/subscriptions/{**catch-all}

    me-route:
      ClusterId: membership-cluster
      Match:
        Path: /api/me/{**catch-all}

    courses-route:
      ClusterId: membership-cluster
      Match:
        Path: /api/courses/{**catch-all}

    requests-route:
      ClusterId: payment-cluster
      Match:
        Path: /api/requests/{**catch-all}

    payment-route:
      ClusterId: payment-cluster
      Match:
        Path: /api/payments/{**catch-all}

    coaches-route:
      ClusterId: courses-cluster
      Match:
        Path: /api/coaches/{**catch-all}

    programs-route:
      ClusterId: courses-cluster
      Match:
        Path: /api/programs/{**catch-all}

    sessions-route:
      ClusterId: courses-cluster
      Match:
        Path: /api/sessions/{**catch-all}

    activity-route:
      ClusterId: activity-cluster
      Match:
        Path: /api/activity/{**catch-all}

    dashboard-route:
      ClusterId: aggregation-cluster
      Match:
        Path: /api/dashboard/{**catch-all}

    reports-route:
      ClusterId: aggregation-cluster
      Match:
        Path: /api/reports/{**catch-all}

    chat-route:
      ClusterId: chat-cluster
      Match:
        Path: /api/conversations/{**catch-all}

    chat-hub-route:
      ClusterId: chat-cluster
      Match:
        Path: /hubs/chat/{**catch-all}

    # OpenAPI doc discovery routes
    identity-openapi-route:
      ClusterId: identity-cluster
      Match:
        Path: /docs/identity/{**catch-all}
      Transforms:
        - PathPattern: "/openapi/v1.json"

    membership-openapi-route:
      ClusterId: membership-cluster
      Match:
        Path: /docs/membership/{**catch-all}
      Transforms:
        - PathPattern: "/openapi/v1.json"

    payment-openapi-route:
      ClusterId: payment-cluster
      Match:
        Path: /docs/payment/{**catch-all}
      Transforms:
        - PathPattern: "/openapi/v1.json"

    courses-openapi-route:
      ClusterId: courses-cluster
      Match:
        Path: /docs/courses/{**catch-all}
      Transforms:
        - PathPattern: "/openapi/v1.json"

    activity-openapi-route:
      ClusterId: activity-cluster
      Match:
        Path: /docs/activity/{**catch-all}
      Transforms:
        - PathPattern: "/openapi/v1.json"

    aggregation-openapi-route:
      ClusterId: aggregation-cluster
      Match:
        Path: /docs/aggregation/{**catch-all}
      Transforms:
        - PathPattern: "/openapi/v1.json"

    chat-openapi-route:
      ClusterId: chat-cluster
      Match:
        Path: /docs/chat/{**catch-all}
      Transforms:
        - PathPattern: "/openapi/v1.json"

  Clusters:
    identity-cluster:
      Destinations:
        identity-api:
          Address: http+https://identity-api

    membership-cluster:
      Destinations:
        membership-api:
          Address: http+https://membership-api

    payment-cluster:
      Destinations:
        payment-api:
          Address: http+https://payment-api

    courses-cluster:
      Destinations:
        courses-api:
          Address: http+https://courses-api

    activity-cluster:
      Destinations:
        activity-api:
          Address: http+https://activity-api

    aggregation-cluster:
      Destinations:
        aggregation-api:
          Address: http+https://aggregation-api

    chat-cluster:
      Destinations:
        chat-api:
          Address: http+https://chat-api
